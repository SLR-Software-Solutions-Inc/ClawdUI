name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: cd sidecar && npm ci && npm run build
      - run: npm run check
      - run: npm run build
      - run: cd src-tauri && cargo check
