name: Bump Version
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # NOTE: Uses CLAWDUI_TOKEN (a PAT with `contents:write` + `workflows` scopes)
      # instead of GITHUB_TOKEN. GitHub anti-recursion suppresses workflow triggers
      # from default-token pushes, so a tag pushed via GITHUB_TOKEN would NOT fire
      # release.yml's `on: push.tags` trigger. The PAT identity bypasses this.
      # See docs/PUBLISHING.md for setup.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAWDUI_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: ver
        run: |
          set -e
          CUR=$(node -p "require('./package.json').version")
          echo "current=$CUR"
          IFS='.' read -r MA MI PA <<< "$CUR"
          case "${{ inputs.bump }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          NEW="${MA}.${MI}.${PA}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW"

      - name: Update package.json
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${{ steps.ver.outputs.new }}';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Update src-tauri/Cargo.toml
        run: |
          sed -i -E 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"/version = "${{ steps.ver.outputs.new }}"/' src-tauri/Cargo.toml

      - name: Update src-tauri/tauri.conf.json
        run: |
          node -e "const fs=require('fs');const p=require('./src-tauri/tauri.conf.json');p.version='${{ steps.ver.outputs.new }}';fs.writeFileSync('./src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n');"

      - name: Update VERSION file
        run: echo "${{ steps.ver.outputs.new }}" > VERSION

      - name: Commit, tag, push
        run: |
          NEW="${{ steps.ver.outputs.new }}"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json VERSION
          git commit -m "chore(version): bump to v${NEW}"
          git tag "v${NEW}"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
          git push origin "v${NEW}"
