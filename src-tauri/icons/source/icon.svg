<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="04 AI Iris">
  <defs>
    <radialGradient id="t4" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#241710"/>
      <stop offset="60%" stop-color="#0d0a07"/>
      <stop offset="100%" stop-color="#040302"/>
    </radialGradient>
    <radialGradient id="iris4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3c1d05"/>
      <stop offset="60%" stop-color="#a04e08"/>
      <stop offset="100%" stop-color="#ffd28a"/>
    </radialGradient>
    <filter id="g4"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#t4)"/>

  <!-- Outer iris ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#f6a23a" stroke-width="4" opacity="0.55"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#7a3a0a" stroke-width="2" opacity="0.7" stroke-dasharray="2 8"/>

  <!-- Iris body -->
  <circle cx="512" cy="512" r="300" fill="url(#iris4)"/>

  <!-- Iris radial spokes -->
  <g stroke="#fff" stroke-width="2" opacity="0.18">
    <line x1="512" y1="232" x2="512" y2="792"/>
    <line x1="232" y1="512" x2="792" y2="512"/>
    <line x1="316" y1="316" x2="708" y2="708"/>
    <line x1="708" y1="316" x2="316" y2="708"/>
    <line x1="380" y1="246" x2="644" y2="778"/>
    <line x1="644" y1="246" x2="380" y2="778"/>
    <line x1="246" y1="380" x2="778" y2="644"/>
    <line x1="246" y1="644" x2="778" y2="380"/>
  </g>

  <!-- Pupil with prompt ">_" -->
  <circle cx="512" cy="512" r="170" fill="#0d0a07"/>
  <circle cx="512" cy="512" r="170" fill="none" stroke="#f6a23a" stroke-width="3" opacity="0.6"/>
  <text x="512" y="556" font-family="JetBrains Mono, Menlo, DejaVu Sans Mono, monospace"
        font-size="160" font-weight="900" fill="#ffd28a" text-anchor="middle"
        letter-spacing="-8">&gt;_</text>

  <!-- Specular highlight -->
  <ellipse cx="430" cy="430" rx="60" ry="32" fill="rgba(255,255,255,0.10)" filter="url(#g4)"/>

  <!-- Scanline -->
  <line x1="80" y1="630" x2="944" y2="630" stroke="#f6a23a" stroke-width="2" opacity="0.22"/>
</svg>
